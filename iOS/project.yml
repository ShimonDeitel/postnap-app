name: Postnap
options:
  bundleIdPrefix: com.shimondeitel.grogginesslog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Postnap:
    type: application
    platform: iOS
    sources:
      - path: Postnap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.grogginesslog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Postnap/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PostnapTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PostnapTests
      - path: Postnap.storekit
    dependencies:
      - target: Postnap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.grogginesslog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PostnapUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PostnapUITests
    dependencies:
      - target: Postnap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.grogginesslog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Postnap:
    build:
      targets:
        Postnap: all
        PostnapTests: [test]
        PostnapUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Postnap.storekit
    test:
      config: Debug
      storeKitConfiguration: Postnap.storekit
      targets:
        - PostnapTests
        - PostnapUITests
    archive:
      config: Release
